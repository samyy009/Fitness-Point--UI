<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Personalized Fitness Plan</title>

<style>
    body {
        margin: 0;
        padding: 0;

        /* 🔥 Add your background image here */
        background-image: url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        /* Dark overlay for readability */
        background-color: rgba(0, 0, 0, 0.75);
        background-blend-mode: overlay;

        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        color: white;
    }

    .container {
        width: 90%;
        max-width: 450px;
        padding: 30px;
        background: rgba(0,0,0,0.55);
        border-radius: 16px;
        box-shadow: 0 0 25px rgba(255,0,0,0.25);
        text-align: center;
        backdrop-filter: blur(6px);
    }

    h1 {
        font-size: 26px;
        margin-bottom: 5px;
        font-weight: 600;
    }

    .subtitle {
        opacity: 0.8;
        margin-bottom: 20px;
        font-size: 15px;
    }

    .plan-box {
        background: rgba(255,255,255,0.1);
        padding: 15px 20px;
        border-radius: 10px;
        margin-bottom: 15px;
        text-align: left;
    }

    .plan-box h2 {
        font-size: 18px;
        margin-bottom: 6px;
    }

    /* Button container */
    .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    @media(max-width: 500px) {
        .btn-row {
            flex-direction: column;
        }
    }

    .btn {
        flex: 1;
        padding: 12px;
        background: #ff3b3b;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-size: 17px;
        transition: 0.2s;
        text-align: center;
        cursor: pointer;
    }

    .btn:hover {
        background: #ff1e1e;
    }
</style>

</head>

<body>

<div class="container">

    <h1>Your Personalized Fitness Plan</h1>
    <p class="subtitle">Based on your selections</p>

    <div class="plan-box">
        <h2>Goal</h2>
        <p id="goal-output">Loading...</p>
    </div>

    <div class="plan-box">
        <h2>Workout Type</h2>
        <p id="workout-output">Loading...</p>
    </div>

    <div class="plan-box">
        <h2>Experience Level</h2>
        <p id="level-output">Loading...</p>
    </div>

    <div class="btn-row">
        <a href="get-started.html" class="btn">Go Back</a>
        <a href="index.html" class="btn">Dashboard</a>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const goal = localStorage.getItem("goal");
    const type = localStorage.getItem("workout_type");
    const level = localStorage.getItem("level");

    document.getElementById("goal-output").textContent =
        goal || "Not selected";

    document.getElementById("workout-output").textContent =
        type || "Not selected";

    document.getElementById("level-output").textContent =
        level || "Not selected";
});
</script>

</body>
</html>
